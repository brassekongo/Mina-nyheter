<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLARTTEXT — Nyheter utan brus</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --ink: #1a1714; --paper: #f5f0e8; --accent: #c0392b; --muted: #7a7268; --rule: #c8c0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--paper); color: var(--ink); font-family: 'Source Serif 4', serif; min-height: 100vh; line-height: 1.6; }
        .masthead { border-bottom: 3px double var(--ink); padding: 40px 20px; text-align: center; }
        .masthead-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; letter-spacing: -2px; }
        .categories { border-bottom: 1px solid var(--rule); padding: 10px; display: flex; justify-content: center; gap: 15px; }
        .cat-btn { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; background: none; border: none; cursor: pointer; color: var(--muted); text-transform: uppercase; padding: 5px 10px; }
        .cat-btn.active { color: var(--ink); border-bottom: 2px solid var(--accent); }
        .main { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .article { padding: 30px 0; border-bottom: 1px solid var(--rule); }
        .article-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        .article-headline { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 10px; line-height: 1.2; }
        .article-headline a { color: inherit; text-decoration: none; }
        .article-body { color: #333; font-weight: 300; }
        #loading { text-align: center; font-family: 'IBM Plex Mono'; padding: 40px; }
    </style>
</head>
<body>

<header class="masthead">
    <div class="masthead-title">KLARTTEXT</div>
    <div style="font-family:'IBM Plex Mono'; font-size:0.7rem; color:var(--muted); margin-top:10px;" id="dateDisplay"></div>
</header>

<nav class="categories">
    <button class="cat-btn active" onclick="loadRSS('https://feeds.expressen.se')">Sverige</button>
    <button class="cat-btn" onclick="loadRSS('https://feeds.expressen.se')">Världen</button>
    <button class="cat-btn" onclick="loadRSS('https://feeds.expressen.se')">Ekonomi</button>
</nav>

<main class="main">
    <div id="loading" style="display:none;">LÄSER IN DAGENS TIDNING...</div>
    <div id="newsContainer">
        <div style="text-align:center; padding:50px;">
            <button onclick="loadRSS('https://feeds.expressen.se')" style="padding:15px 30px; background:var(--ink); color:white; border:none; font-family:'IBM Plex Mono'; cursor:pointer;">ÖPPNA TIDNINGEN</button>
        </div>
    </div>
</main>

<script>
    document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('sv-SE', { weekday:'long', year:'numeric', month:'long', day:'numeric' }).toUpperCase();

    async function loadRSS(url) {
        const container = document.getElementById('newsContainer');
        const loader = document.getElementById('loading');
        loader.style.display = 'block';
        container.innerHTML = '';

        try {
            // Vi använder en öppen tjänst som gör om RSS till JSON (rss2json)
            // Detta är det säkraste sättet att undvika "Failed to fetch" på GitHub
            const response = await fetch(`https://api.rss2json.com{encodeURIComponent(url)}`);
            const data = await response.json();

            loader.style.display = 'none';
            if (data.items) {
                data.items.forEach(item => {
                    const article = document.createElement('div');
                    article.className = 'article';
                    const pubDate = new Date(item.pubDate).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
                    
                    article.innerHTML = `
                        <div class="article-meta">${item.author || 'NYHETER'} • ${pubDate}</div>
                        <h2 class="article-headline"><a href="${item.link}" target="_blank">${item.title}</a></h2>
                        <div class="article-body">${item.description.replace(/<[^>]*>?/gm, '').substring(0, 200)}...</div>
                    `;
                    container.appendChild(article);
                });
            }
        } catch (err) {
            loader.style.display = 'none';
            container.innerHTML = `<p style="text-align:center;">Kunde inte ladda nyheter. Testa att stänga av eventuell AdBlocker.</p>`;
        }
    }
</script>
</body>
</html>
