<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLARTTEXT — Nyheter utan brus</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<style>
  :root { --ink: #1a1714; --paper: #f5f0e8; --accent: #c0392b; --muted: #7a7268; --rule: #c8c0b0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--paper); color: var(--ink); font-family: 'Source Serif 4', serif; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.5;
  }
  .masthead { border-bottom: 3px double var(--ink); padding: 40px 20px; text-align: center; }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; letter-spacing: -2px; }
  .categories { border-bottom: 1px solid var(--rule); padding: 10px; display: flex; justify-content: center; gap: 15px; overflow-x: auto; }
  .cat-btn { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; background: none; border: none; cursor: pointer; color: var(--muted); text-transform: uppercase; padding: 5px 10px; }
  .cat-btn.active { color: var(--ink); border-bottom: 2px solid var(--accent); }
  .main { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
  .article { padding: 35px 0; border-bottom: 1px solid var(--rule); animation: fadeIn 0.6s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .article-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
  .article-headline { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 15px; line-height: 1.2; }
  .article-headline a { color: inherit; text-decoration: none; }
  .article-body { font-size: 1.1rem; line-height: 1.7; color: #333; font-weight: 300; }
  #loading { text-align: center; font-family: 'IBM Plex Mono'; padding: 60px; display: none; }
</style>
</head>
<body>

<header class="masthead">
    <div class="masthead-title">KLARTTEXT</div>
    <div style="font-family:'IBM Plex Mono'; font-size:0.7rem; color:var(--muted); margin-top:10px;" id="dateDisplay"></div>
</header>

<nav class="categories">
    <button class="cat-btn active" onclick="fetchNews('https://www.expressen.se')">Sverige</button>
    <button class="cat-btn" onclick="fetchNews('https://www.expressen.se')">Världen</button>
    <button class="cat-btn" onclick="fetchNews('https://www.expressen.se')">Ekonomi</button>
</nav>

<main class="main">
    <div id="loading">HÄMTAR DAGENS TIDNING...</div>
    <div id="newsContainer">
        <div style="text-align:center; padding:100px 0;">
            <button onclick="fetchNews('https://www.expressen.se')" style="padding:15px 30px; background:var(--ink); color:white; border:none; font-family:'IBM Plex Mono'; cursor:pointer; text-transform:uppercase;">Öppna Tidningen</button>
        </div>
    </div>
</main>

<script>
    document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('sv-SE', { weekday:'long', year:'numeric', month:'long', day:'numeric' }).toUpperCase();

    async function fetchNews(rssUrl) {
        const container = document.getElementById('newsContainer');
        const loader = document.getElementById('loading');
        loader.style.display = 'block';
        container.innerHTML = '';

        // Ny proxy som fungerar bättre 2026
        const proxyUrl = "https://corsproxy.io?" + encodeURIComponent(rssUrl);

        try {
            const response = await fetch(proxyUrl);
            const text = await response.text();
            
            // Vi läser XML-datan direkt
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item");

            loader.style.display = 'none';
            items.forEach((item, i) => {
                if (i > 10) return;
                const title = item.querySelector("title").textContent;
                const link = item.querySelector("link").textContent;
                const desc = item.querySelector("description").textContent.replace(/<[^>]*>?/gm, '').substring(0, 150);
                const pubDate = new Date(item.querySelector("pubDate").textContent).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});

                const article = document.createElement('div');
                article.className = 'article';
                article.innerHTML = `
                    <div class="article-meta">EXPRESSEN • ${pubDate}</div>
                    <h2 class="article-headline"><a href="${link}" target="_blank">${title}</a></h2>
                    <div class="article-body">${desc}...</div>
                `;
                container.appendChild(article);
            });
        } catch (err) {
            loader.style.display = 'none';
            container.innerHTML = `<p style="text-align:center; padding:40px;">Kunde inte ladda nyheter. Testa att trycka Ctrl+F5.</p>`;
        }
    }
</script>
</body>
</html>
